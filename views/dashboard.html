<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NairaPay Admin Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      background-color: #f8f9fc;
    }
    .sidebar {
      width: 220px;
      background-color: #40376E;
      color: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .sidebar h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.3rem;
    }
    .sidebar ul {
      list-style: none;
      padding: 0;
    }
    .sidebar ul li {
      margin-bottom: 15px;
    }
    .sidebar ul li a {
      color: white;
      text-decoration: none;
      display: block;
      padding: 10px;
      border-radius: 6px;
      transition: 0.3s;
    }
    .sidebar ul li a:hover {
      background-color: rgba(255, 255, 255, 0.2);
    }
    .main {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }
    .hidden { display: none; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: #40376E;
      color: white;
    }
    tr:nth-child(even) { background-color: #f2f2f2; }
    tr:hover { background-color: #e0e0e0; }

    form input, form select, form button {
      margin: 5px;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    form button {
      background-color: #40376E;
      color: white;
      border: none;
      cursor: pointer;
    }
    form button:hover { background-color: #312c59; }

    .credential-pair {
      display: flex;
      gap: 5px;
      margin-bottom: 5px;
    }
    .credential-pair input {
      flex: 1;
    }
  </style>
</head>

<body>
  <!-- ===== Sidebar ===== -->
  <div class="sidebar">
    <div>
      <h2>NairaPay Admin</h2>
      <ul>
        <li><a href="#" id="dashboardBtn">Dashboard</a></li>
        <li><a href="#" id="usersBtn">Users</a></li>
        <li><a href="#" id="integrationsBtn">Integrations</a></li>
      </ul>
    </div>
    <button id="logoutBtn" style="background: #e74c3c; border: none; padding: 10px; color: white; border-radius: 6px; cursor: pointer;">Logout</button>
  </div>

  <!-- ===== Main Content ===== -->
  <div class="main">
    <!-- Dashboard Section -->
    <section id="dashboardSection">
      <h1>Dashboard</h1>
      <div id="dashboardContent">Loading...</div>
    </section>

    <!-- Users Section -->
    <section id="usersSection" class="hidden">
      <h2>Registered Users</h2>
      <table id="usersTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Date Joined</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- Integrations Section -->
    <section id="integrationsSection" class="hidden">
      <h2>Service Integrations</h2>
      <form id="addIntegrationForm">
        <input type="text" id="providerName" placeholder="Provider Name (e.g., VTpass)" required />
        <select id="category" required>
          <option value="">Select Category</option>
          <option value="airtime">Airtime</option>
          <option value="data">Data</option>
          <option value="electricity">Electricity</option>
          <option value="tv">TV</option>
          <option value="betting">Betting</option>
          <option value="others">Others</option>
        </select>
        <input type="text" id="baseUrl" placeholder="Base URL (e.g., https://api.vtpass.com)" required />
        <select id="mode">
          <option value="live">Live</option>
          <option value="sandbox">Sandbox</option>
        </select>

        <div id="credentialsContainer">
          <h4>Credentials</h4>
          <div class="credential-pair">
            <input type="text" placeholder="Label (e.g., Public Key)" class="label" />
            <input type="text" placeholder="Value" class="value" />
          </div>
        </div>
        <button type="button" id="addCredentialField">+ Add Field</button>
        <button type="submit">Save Integration</button>
      </form>

      <table id="integrationsTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Provider</th>
            <th>Category</th>
            <th>Mode</th>
            <th>Base URL</th>
            <th>Credentials</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </div>

  <script src="/dashboard.js"></script>
</body>
</html>
