<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NairaPay Admin Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      background-color: #f8f9fc;
    }
    .sidebar {
      width: 220px;
      background-color: #40376E;
      color: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .sidebar h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.3rem;
    }
    .sidebar ul {
      list-style: none;
      padding: 0;
    }
    .sidebar ul li {
      margin-bottom: 15px;
    }
    .sidebar ul li a {
      color: white;
      text-decoration: none;
      display: block;
      padding: 10px;
      border-radius: 6px;
      transition: 0.3s;
    }
    .sidebar ul li a:hover {
      background-color: rgba(255, 255, 255, 0.2);
    }
    .main {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }
    .hidden { display: none; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: #40376E;
      color: white;
    }
    tr:nth-child(even) { background-color: #f2f2f2; }
    tr:hover { background-color: #e0e0e0; }

    form input, form select, form button {
      margin: 5px;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    form button {
      background-color: #40376E;
      color: white;
      border: none;
      cursor: pointer;
    }
    form button:hover { background-color: #312c59; }

    .credential-pair {
      display: flex;
      gap: 5px;
      margin-bottom: 5px;
    }
    .credential-pair input {
      flex: 1;
    }
  </style>
</head>

<body>
  <!-- ===== Sidebar ===== -->
  <div class="sidebar">
    <div>
      <h2>NairaPay Admin</h2>
      <ul>
        <li><a href="#" id="dashboardBtn">Dashboard</a></li>
        <li><a href="#" id="usersBtn">Users</a></li>
        <li><a href="#" id="integrationsBtn">Integrations</a></li>
      </ul>
    </div>
    <button id="logoutBtn" style="background: #e74c3c; border: none; padding: 10px; color: white; border-radius: 6px; cursor: pointer;">Logout</button>
  </div>

  <!-- ===== Main Content ===== -->
  <div class="main">
    <!-- Dashboard Section -->
    <section id="dashboardSection">
      <h1>Dashboard</h1>
      <div id="dashboardContent">Loading...</div>
    </section>

    <!-- Users Section -->
    <section id="usersSection" class="hidden">
      <h2>Registered Users</h2>
      <table id="usersTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Date Joined</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- Integrations Section -->
    <section id="integrationsSection" class="hidden">
      <h2>Service Integrations</h2>
      <form id="addIntegrationForm">
        <input type="text" id="providerName" placeholder="Provider Name (e.g., VTpass)" required />
        <select id="category" required>
          <option value="">Select Category</option>
          <option value="airtime">Airtime</option>
          <option value="data">Data</option>
          <option value="electricity">Electricity</option>
          <option value="tv">TV</option>
          <option value="betting">Betting</option>
          <option value="others">Others</option>
        </select>
        <input type="text" id="baseUrl" placeholder="Base URL (e.g., https://api.vtpass.com)" required />
        <select id="mode">
          <option value="live">Live</option>
          <option value="sandbox">Sandbox</option>
        </select>

        <div id="credentialsContainer">
          <h4>Credentials</h4>
          <div class="credential-pair">
            <input type="text" placeholder="Label (e.g., Public Key)" class="label" />
            <input type="text" placeholder="Value" class="value" />
          </div>
        </div>
        <button type="button" id="addCredentialField">+ Add Field</button>
        <button type="submit">Save Integration</button>
      </form>

      <table id="integrationsTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Provider</th>
            <th>Category</th>
            <th>Mode</th>
            <th>Base URL</th>
            <th>Credentials</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const token = localStorage.getItem("token");
      if (!token) {
        alert("Session expired. Please log in again.");
        window.location.href = "/admin";
        return;
      }

      // Verify Token
      try {
        const res = await fetch("/api/auth/verify-token", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
        });
        const data = await res.json();
        if (!data.success) {
          localStorage.removeItem("token");
          window.location.href = "/admin";
        } else {
          document.getElementById("dashboardContent").textContent =
            `Welcome, ${data.user.name} 👋`;
        }
      } catch (error) {
        console.error(error);
      }

      const dashboardSection = document.getElementById("dashboardSection");
      const usersSection = document.getElementById("usersSection");
      const integrationsSection = document.getElementById("integrationsSection");

      // Sidebar buttons
      document.getElementById("dashboardBtn").onclick = () => {
        dashboardSection.classList.remove("hidden");
        usersSection.classList.add("hidden");
        integrationsSection.classList.add("hidden");
      };

      document.getElementById("usersBtn").onclick = async () => {
        dashboardSection.classList.add("hidden");
        integrationsSection.classList.add("hidden");
        usersSection.classList.remove("hidden");

        try {
          const res = await fetch("/api/admin/users", {
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await res.json();
          const tbody = document.querySelector("#usersTable tbody");
          tbody.innerHTML = "";

          if (data.success && data.users.length) {
            data.users.forEach((user, i) => {
              tbody.innerHTML += `
                <tr>
                  <td>${i + 1}</td>
                  <td>${user.name}</td>
                  <td>${user.email}</td>
                  <td>${new Date(user.createdAt).toLocaleDateString()}</td>
                </tr>`;
            });
          }
        } catch (err) {
          alert("Failed to load users.");
        }
      };

      // Integrations
      document.getElementById("integrationsBtn").onclick = async () => {
        dashboardSection.classList.add("hidden");
        usersSection.classList.add("hidden");
        integrationsSection.classList.remove("hidden");
        await loadIntegrations();
      };

      async function loadIntegrations() {
        const tbody = document.querySelector("#integrationsTable tbody");
        tbody.innerHTML = "<tr><td colspan='7'>Loading...</td></tr>";

        try {
          const res = await fetch("/api/admin/integrations", {
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await res.json();

          if (data.success && data.integrations.length) {
            tbody.innerHTML = "";
            data.integrations.forEach((intg, i) => {
              const creds = intg.credentials.map(c => `<b>${c.label}:</b> ${c.value}`).join("<br>");
              tbody.innerHTML += `
                <tr>
                  <td>${i + 1}</td>
                  <td>${intg.providerName}</td>
                  <td>${intg.category}</td>
                  <td>${intg.mode}</td>
                  <td>${intg.baseUrl}</td>
                  <td>${creds}</td>
                  <td><button onclick="deleteIntegration('${intg._id}')">Delete</button></td>
                </tr>`;
            });
          } else {
            tbody.innerHTML = "<tr><td colspan='7'>No integrations found.</td></tr>";
          }
        } catch (err) {
          tbody.innerHTML = "<tr><td colspan='7'>Failed to load integrations.</td></tr>";
        }
      }

      // Add new credential field
      document.getElementById("addCredentialField").onclick = () => {
        const container = document.getElementById("credentialsContainer");
        const div = document.createElement("div");
        div.className = "credential-pair";
        div.innerHTML = `
          <input type="text" placeholder="Label (e.g., Secret Key)" class="label" />
          <input type="text" placeholder="Value" class="value" />
        `;
        container.appendChild(div);
      };

      // Save new integration
      document.getElementById("addIntegrationForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const providerName = document.getElementById("providerName").value;
        const category = document.getElementById("category").value;
        const baseUrl = document.getElementById("baseUrl").value;
        const mode = document.getElementById("mode").value;

        const credentialPairs = Array.from(document.querySelectorAll(".credential-pair")).map(div => {
          const label = div.querySelector(".label").value.trim();
          const value = div.querySelector(".value").value.trim();
          return label && value ? { label, value } : null;
        }).filter(Boolean);

        try {
          const res = await fetch("/api/admin/integrations", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ providerName, category, baseUrl, mode, credentials: credentialPairs }),
          });
          const data = await res.json();
          if (data.success) {
            alert("Integration saved!");
            e.target.reset();
            await loadIntegrations();
          } else {
            alert("Failed: " + data.message);
          }
        } catch (err) {
          alert("Error saving integration.");
        }
      });

      // Delete integration
      window.deleteIntegration = async (id) => {
        if (!confirm("Are you sure you want to delete this integration?")) return;
        try {
          const res = await fetch(`/api/admin/integrations/${id}`, {
            method: "DELETE",
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await res.json();
          if (data.success) await loadIntegrations();
          else alert(data.message);
        } catch (err) {
          alert("Failed to delete.");
        }
      };

      // Logout
      document.getElementById("logoutBtn").onclick = () => {
        localStorage.removeItem("token");
        window.location.href = "/admin";
      };
    });
  </script>
</body>
</html>
